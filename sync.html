<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f8fafc" />
  <title>Akash Core · Sync</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f1f5f9;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .title { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
    .subtitle { font-size: 12px; color: #94a3b8; margin-top: 2px; }

    .sync-badge {
      font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
      padding: 4px 10px; border-radius: 20px;
      background: #f1f5f9; color: #94a3b8; white-space: nowrap;
    }
    .sync-badge.synced { background: #dcfce7; color: #16a34a; }
    .sync-badge.offline { background: #fee2e2; color: #dc2626; }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .date-nav button {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      width: 28px;
      height: 28px;
      font-size: 14px;
      color: #64748b;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .date-nav button:hover:not(:disabled) {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }
    .date-nav button:disabled {
      color: #cbd5e1;
      border-color: #f1f5f9;
      cursor: default;
    }
    .date-label {
      font-size: 11px; font-weight: 700; color: #94a3b8;
      letter-spacing: 0.8px; text-transform: uppercase;
      flex: 1; text-align: center;
    }

    .pillars { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .pillar {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
      transition: border-color 0.2s;
    }
    .pillar.has-data { background: #fff; }

    .pillar-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .pillar-emoji { font-size: 20px; line-height: 1; }
    .pillar-pct {
      font-size: 15px; font-weight: 800; letter-spacing: -0.5px;
      color: #cbd5e1;
    }
    .pillar-pct.active { color: inherit; }

    .pillar-name {
      font-size: 10px; font-weight: 700; color: #94a3b8;
      letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 6px;
    }

    .items { display: flex; flex-direction: column; gap: 3px; }
    .item {
      font-size: 11px; color: #94a3b8;
      display: flex; align-items: center; gap: 5px;
    }
    .item.filled { color: #475569; }
    .item-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: #e2e8f0; flex-shrink: 0;
    }
    .item.filled .item-dot { background: currentColor; }

    .bar-wrap { height: 3px; background: #e2e8f0; border-radius: 2px; margin-top: 10px; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

    .overall {
      margin-top: 12px; padding: 14px 16px;
      background: #f8fafc; border: 1px solid #e2e8f0;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .overall-label { font-size: 13px; font-weight: 600; color: #475569; }
    .overall-score { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #0f172a; }

    .footer {
      margin-top: 14px; font-size: 11px; color: #cbd5e1; text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div>
        <div class="title">Akash Core ⚡</div>
        <div class="subtitle">Live Sync Dashboard</div>
      </div>
      <div class="sync-badge" id="syncBadge">● Connecting</div>
    </div>

    <div class="date-nav">
      <button id="btnPrev" title="Previous day">&#8249;</button>
      <div class="date-label" id="dateLabel">Today</div>
      <button id="btnNext" title="Next day" disabled>&#8250;</button>
    </div>

    <div class="pillars" id="pillars"></div>
    <div class="overall" id="overall" style="display:none">
      <div class="overall-label">Overall completion</div>
      <div class="overall-score" id="overallScore">—</div>
    </div>
    <div class="footer" id="footer">Waiting for data…</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
  <script>
    const PILLARS = {
      warrior:   { label: 'Warrior',   emoji: '⚔️',  color: '#ef4444' },
      mastery:   { label: 'Mastery',   emoji: '🧠',  color: '#8b5cf6' },
      influence: { label: 'Influence', emoji: '🌍',  color: '#f59e0b' },
      grounding: { label: 'Grounding', emoji: '🌿',  color: '#10b981' }
    };

    // offset = 0 means today, -1 = yesterday, etc.
    let offset = 0;
    let fbData = null;

    // Use local date math to avoid UTC timezone issues
    function getDateStr(off) {
      const d = new Date();
      d.setDate(d.getDate() + off);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function fmtDate(dateStr) {
      // Parse as local date to avoid off-by-one from UTC conversion
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d).toLocaleDateString('en-US', {
        weekday: 'short', month: 'short', day: 'numeric'
      });
    }

    function countFields(obj) {
      if (!obj || typeof obj !== 'object') {
        return { filled: (obj ? 1 : 0), total: 1 };
      }
      let filled = 0, total = 0;
      for (const val of Object.values(obj)) {
        const r = countFields(val);
        filled += r.filled;
        total += r.total;
      }
      return { filled, total };
    }

    function getItems(obj) {
      const items = [];
      if (!obj || typeof obj !== 'object') return items;
      for (const [k, v] of Object.entries(obj)) {
        if (typeof v === 'object' && v !== null) {
          for (const [k2, v2] of Object.entries(v)) {
            items.push({ label: k2.replace(/_/g, ' '), filled: !!v2 });
          }
        } else {
          items.push({ label: k.replace(/_/g, ' '), filled: !!v });
        }
      }
      return items.slice(0, 5);
    }

    function renderForOffset() {
      if (!fbData) return;

      const dateStr = getDateStr(offset);
      const isToday = offset === 0;

      // Update nav buttons
      document.getElementById('btnNext').disabled = isToday;
      document.getElementById('dateLabel').textContent = isToday ? 'TODAY · ' + fmtDate(dateStr) : fmtDate(dateStr);

      const dayData = fbData[dateStr] || {};

      const pillarsEl = document.getElementById('pillars');
      pillarsEl.innerHTML = '';

      let totalFilled = 0, totalFields = 0;

      for (const [key, pillar] of Object.entries(PILLARS)) {
        const pillarData = dayData[key];
        const { filled, total } = pillarData ? countFields(pillarData) : { filled: 0, total: 0 };
        const pct = total > 0 ? Math.round((filled / total) * 100) : 0;
        totalFilled += filled;
        totalFields += total;

        const items = getItems(pillarData);
        const hasData = filled > 0;

        const div = document.createElement('div');
        div.className = 'pillar' + (hasData ? ' has-data' : '');
        if (hasData) div.style.borderColor = pillar.color + '50';

        const itemsHtml = items.length > 0
          ? `<div class="items">${items.map(item =>
              `<div class="item${item.filled ? ' filled' : ''}">
                <div class="item-dot"></div>
                <span>${item.label}</span>
              </div>`).join('')}</div>`
          : `<div style="font-size:11px;color:#cbd5e1">No data yet</div>`;

        div.innerHTML = `
          <div class="pillar-top">
            <span class="pillar-emoji">${pillar.emoji}</span>
            <span class="pillar-pct${hasData ? ' active' : ''}" style="color:${hasData ? pillar.color : ''}">${hasData ? pct + '%' : '—'}</span>
          </div>
          <div class="pillar-name">${pillar.label}</div>
          ${itemsHtml}
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${pillar.color}"></div></div>
        `;
        pillarsEl.appendChild(div);
      }

      const overallPct = totalFields > 0 ? Math.round((totalFilled / totalFields) * 100) : 0;
      document.getElementById('overall').style.display = 'flex';
      document.getElementById('overallScore').textContent = overallPct > 0 ? overallPct + '%' : '—';
    }

    // Date navigation
    document.getElementById('btnPrev').addEventListener('click', () => {
      offset -= 1;
      renderForOffset();
    });
    document.getElementById('btnNext').addEventListener('click', () => {
      if (offset < 0) {
        offset += 1;
        renderForOffset();
      }
    });

    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyACCybk41cW0K272GhvfqgyhKf8x8ee5ys",
      authDomain: "akash-core.firebaseapp.com",
      databaseURL: "https://akash-core-default-rtdb.firebaseio.com",
      projectId: "akash-core",
      storageBucket: "akash-core.firebasestorage.app",
      messagingSenderId: "94555846142",
      appId: "1:94555846142:web:1f58da53f4ae7507443caf"
    };

    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      const fbRef = firebase.database().ref('four_pillars');

      fbRef.on('value', (snapshot) => {
        const badge = document.getElementById('syncBadge');
        badge.textContent = '● SYNCED';
        badge.className = 'sync-badge synced';
        fbData = snapshot.val();
        if (fbData) {
          renderForOffset();
          const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
          document.getElementById('footer').textContent = `Last synced · ${now}`;
        } else {
          document.getElementById('footer').textContent = 'No data in Firebase yet';
        }
      }, () => {
        const badge = document.getElementById('syncBadge');
        badge.textContent = '● OFFLINE';
        badge.className = 'sync-badge offline';
      });
    } catch(e) {
      document.getElementById('syncBadge').textContent = '● ERROR';
      document.getElementById('syncBadge').className = 'sync-badge offline';
    }
  </script>
</body>
</html>
