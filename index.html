<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f8fafc" />
  <title>Akash Core</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f8fafc;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .title { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .subtitle { font-size: 13px; color: #64748b; margin-top: 3px; }

    .sync-badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      padding: 4px 10px;
      border-radius: 20px;
      background: #f1f5f9;
      color: #94a3b8;
      white-space: nowrap;
    }
    .sync-badge.synced { background: #dcfce7; color: #16a34a; }
    .sync-badge.offline { background: #fee2e2; color: #dc2626; }

    .date-label {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .pillars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .pillar {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      padding: 14px;
    }

    .pillar-emoji { font-size: 20px; line-height: 1; margin-bottom: 8px; }
    .pillar-name {
      font-size: 10px;
      font-weight: 700;
      color: #94a3b8;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .pillar-score {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -1px;
      color: #0f172a;
    }
    .pillar-score.zero { color: #cbd5e1; }

    .bar-wrap { height: 3px; background: #e2e8f0; border-radius: 2px; margin-top: 8px; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }

    .overall {
      margin-top: 16px;
      padding: 14px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .overall-label { font-size: 13px; font-weight: 600; color: #475569; }
    .overall-score { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }

    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: #cbd5e1;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div>
        <div class="title">Akash Core ⚡</div>
        <div class="subtitle">Sync Dashboard</div>
      </div>
      <div class="sync-badge" id="syncBadge">● Connecting</div>
    </div>

    <div class="date-label" id="dateLabel">Today</div>

    <div class="pillars" id="pillars"></div>

    <div class="overall" id="overall" style="display:none">
      <div class="overall-label">Overall</div>
      <div class="overall-score" id="overallScore">—</div>
    </div>

    <div class="footer" id="footer">Waiting for data…</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
  <script>
    const PILLARS = {
      warrior:   { label: 'Warrior',   emoji: '⚔️',  color: '#ef4444',
        metrics: {
          training:   { type: 'tiered_number', tiers: [{key:'none',score:0},{key:'light',score:40},{key:'moderate',score:75},{key:'intense',score:100}], weight: 35 },
          nutrition:  { type: 'weighted_checklist', items: { protein:{label:'Protein',w:30}, veggies:{label:'Veggies',w:20}, hydration:{label:'Hydration',w:20}, noJunk:{label:'No junk',w:30} }, weight: 30 },
          sleep:      { type: 'tiered_number', tiers: [{key:'none',score:0},{key:'poor',score:20},{key:'ok',score:60},{key:'good',score:100}], weight: 25 },
          recovery:   { type: 'weighted_checklist', items: { stretch:{label:'Stretch',w:50}, cold:{label:'Cold',w:50} }, weight: 10 }
        }
      },
      mastery:   { label: 'Mastery',   emoji: '🧠',  color: '#8b5cf6',
        metrics: {
          deepWork:   { type: 'tiered_number', tiers: [{key:'none',score:0},{key:'one',score:40},{key:'two',score:75},{key:'three',score:100}], weight: 40 },
          learning:   { type: 'weighted_checklist', items: { read:{label:'Read',w:50}, notes:{label:'Notes',w:50} }, weight: 20 },
          shipping:   { type: 'tiered_selector', groups: { type: { label:'Type', tiers:[{key:'none',label:'None'},{key:'code',label:'Code'},{key:'design',label:'Design'},{key:'writing',label:'Writing'}] } }, weight: 40 }
        }
      },
      influence: { label: 'Influence', emoji: '🌍',  color: '#f59e0b',
        metrics: {
          content:    { type: 'tiered_number', tiers: [{key:'none',score:0},{key:'ideated',score:30},{key:'drafted',score:65},{key:'posted',score:100}], weight: 50 },
          network:    { type: 'weighted_checklist', items: { reached:{label:'Reached out',w:50}, responded:{label:'Responded',w:50} }, weight: 30 },
          visibility: { type: 'weighted_checklist', items: { engaged:{label:'Engaged',w:100} }, weight: 20 }
        }
      },
      grounding: { label: 'Grounding', emoji: '🌿',  color: '#10b981',
        metrics: {
          meditation: { type: 'tiered_number', tiers: [{key:'none',score:0},{key:'five',score:50},{key:'ten',score:75},{key:'twenty',score:100}], weight: 35 },
          gratitude:  { type: 'weighted_checklist', items: { journal:{label:'Journal',w:60}, shared:{label:'Shared',w:40} }, weight: 25 },
          nature:     { type: 'weighted_checklist', items: { outside:{label:'Outside',w:60}, sunlight:{label:'Sunlight',w:40} }, weight: 20 },
          purpose:    { type: 'weighted_checklist', items: { reviewed:{label:'Reviewed goals',w:100} }, weight: 20 }
        }
      }
    };

    function calcMetricScore(cfg, val) {
      if (!val) return 0;
      if (cfg.type === 'tiered_number' || cfg.type === 'tiered_selector') {
        // For tiered_number: val is a key string
        // For tiered_selector: val is an object {groupKey: tierKey}
        if (cfg.type === 'tiered_number') {
          const tier = cfg.tiers.find(t => t.key === val);
          return tier ? tier.score : 0;
        } else {
          if (!cfg.groups) return 0;
          let total = 0, count = 0;
          for (const [gk, group] of Object.entries(cfg.groups)) {
            const sel = (val[gk] || 'none');
            const tier = group.tiers.find(t => t.key === sel);
            total += tier ? tier.score : 0;
            count++;
          }
          return count ? total / count : 0;
        }
      }
      if (cfg.type === 'weighted_checklist') {
        let score = 0, totalW = 0;
        for (const [k, item] of Object.entries(cfg.items)) {
          if (val[k]) score += item.w;
          totalW += item.w;
        }
        return totalW ? (score / totalW) * 100 : 0;
      }
      return 0;
    }

    function calcPillarScore(pillarCfg, pillarData) {
      if (!pillarData) return 0;
      let weighted = 0, totalW = 0;
      for (const [k, cfg] of Object.entries(pillarCfg.metrics)) {
        const s = calcMetricScore(cfg, pillarData[k]);
        weighted += s * cfg.weight;
        totalW += cfg.weight;
      }
      return totalW ? weighted / totalW : 0;
    }

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function fmtDate(d) {
      return new Date(d + 'T00:00:00').toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function render(data) {
      const today = todayStr();
      const dayData = data?.[today] || {};

      document.getElementById('dateLabel').textContent = fmtDate(today);

      const pillarsEl = document.getElementById('pillars');
      pillarsEl.innerHTML = '';

      let overallTotal = 0;
      let pillarCount = 0;

      for (const [key, pillar] of Object.entries(PILLARS)) {
        const score = Math.round(calcPillarScore(pillar, dayData[key]));
        overallTotal += score;
        pillarCount++;

        const div = document.createElement('div');
        div.className = 'pillar';
        div.style.borderColor = score > 0 ? pillar.color + '40' : '';
        div.innerHTML = `
          <div class="pillar-emoji">${pillar.emoji}</div>
          <div class="pillar-name">${pillar.label}</div>
          <div class="pillar-score${score === 0 ? ' zero' : ''}" style="color:${score > 0 ? pillar.color : ''}">${score > 0 ? score + '%' : '—'}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${score}%;background:${pillar.color}"></div></div>
        `;
        pillarsEl.appendChild(div);
      }

      const overall = Math.round(overallTotal / pillarCount);
      document.getElementById('overall').style.display = 'flex';
      document.getElementById('overallScore').textContent = overall > 0 ? overall + '%' : '—';

      const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('footer').textContent = `Last synced · ${now}`;
    }

    // Firebase setup
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyACCybk41cW0K272GhvfqgyhKf8x8ee5ys",
      authDomain: "akash-core.firebaseapp.com",
      databaseURL: "https://akash-core-default-rtdb.firebaseio.com",
      projectId: "akash-core",
      storageBucket: "akash-core.firebasestorage.app",
      messagingSenderId: "94555846142",
      appId: "1:94555846142:web:1f58da53f4ae7507443caf"
    };

    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      const fbRef = firebase.database().ref('four_pillars');

      fbRef.on('value', (snapshot) => {
        const badge = document.getElementById('syncBadge');
        badge.textContent = '● SYNCED';
        badge.className = 'sync-badge synced';
        const fbData = snapshot.val();
        if (fbData) render(fbData);
      }, () => {
        const badge = document.getElementById('syncBadge');
        badge.textContent = '● OFFLINE';
        badge.className = 'sync-badge offline';
      });
    } catch(e) {
      document.getElementById('syncBadge').textContent = '● ERROR';
      document.getElementById('syncBadge').className = 'sync-badge offline';
    }
  </script>
</body>
</html>
